YPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>啡快写首春天的诗</title>
  
  <!-- 基础样式 -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  
  <!-- 页面样式 -->
  <link rel="stylesheet" href="css/pages/step1.css">
  <link rel="stylesheet" href="css/pages/step2.css">
  <link rel="stylesheet" href="css/pages/step3.css">
  <link rel="stylesheet" href="css/pages/step4.css">
  
  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  
  <!-- ========== 第1步：广告弹窗页 ========== -->
  <div id="step1" class="page active">
    <div class="bg-container"></div>
    <div class="overlay"></div>
    
    <!-- 广告弹窗 -->
    <div class="ad-modal active" id="adModal">
      <button class="ad-modal-close" id="closeAdBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ad-modal-title">你的口令藏着春天的诗哦</div>
      <button class="ad-modal-btn" id="tryBtn">来试试</button>
    </div>
  </div>
  
  <!-- ========== 第2步：互动入口页 ========== -->
  <div id="step2" class="page">
    <div class="bg-container"></div>
    
    <!-- 返回按钮 -->
    <button class="back-btn" id="backToStep1">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    
    <!-- 主标题 -->
    <h1 class="main-title">啡快写首春天的诗</h1>
    
    <!-- 内容区域 -->
    <div class="content-area">
      <div class="greeting">Hey David</div>
      <div class="body-text">春天来的时候
有<span class="highlight-number">50</span>条口令与你相遇

想不想试试
把那些美好的、温暖的片段
重新织成春天的诗行</div>
      <button class="btn-primary start-btn" id="startBtn">开始AI创作</button>
    </div>
    
    <!-- 小字说明 -->
    <div class="note-text">*AI在您过去一年获得啡快口令中，随机选取5个进行组合</div>
  </div>
  
  <!-- ========== 第3步：诗句生成页 ========== -->
  <div id="step3" class="page">
    <div class="bg-container"></div>
    
    <!-- 返回按钮 -->
    <button class="back-btn" id="backToStep2">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    
    <!-- 主标题（与step2位置一致） -->
    <h1 class="main-title">啡快写首春天的诗</h1>
    
    <!-- 内容区域 -->
    <div class="content-area">
      <div class="poem-container" id="poemContainer">
        <!-- 诗句将动态插入这里 -->
      </div>
      <div class="signature" id="signature">——David的啡快口令</div>
    </div>
    
    <!-- 操作按钮 -->
    <div class="action-buttons">
      <button class="btn-icon" id="rewriteBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>重写一首</span>
      </button>
      <button class="btn-icon" id="createPosterBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>生成海报</span>
      </button>
    </div>
    
    <!-- 小字说明 -->
    <div class="note-text">*AI在您过去一年获得啡快口令中，随机选取5个进行组合</div>
  </div>
  
  <!-- ========== 第4步：海报分享页 ========== -->
  <div id="step4" class="page">
    <!-- 海报弹窗 -->
    <div class="poster-modal" id="posterModal">
      <div class="poster-content">
        <div class="poster-title">啡快写首春天的诗</div>
        <div class="poster-poem" id="posterPoem">
          <!-- 海报诗句 -->
        </div>
        <div class="poster-signature">——David的啡快口令</div>
        <div class="poster-guide">还记得你收获的口令吗？
一起来试试，啡快下单，口令成诗</div>
      </div>
    </div>
    
    <!-- 海报外部按钮 -->
    <div class="poster-actions">
      <button class="btn-icon" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="18" cy="5" r="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="18" cy="19" r="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>分享</span>
      </button>
      <button class="btn-icon" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="17 21 17 13 7 13 7 21" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="7 3 7 8 15 8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>保存图片</span>
      </button>
      <button class="btn-icon" id="replayBtn">
        <svg viewBox="0 0 24 24" fill="none">
          <polygon points="5 3 19 12 5 21 5 3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>再玩一次</span>
      </button>
    </div>
    
    <!-- 分享浮层 -->
    <div class="share-overlay" id="shareOverlay"></div>
    <div class="share-sheet" id="shareSheet">
      <div class="share-title">分享到</div>
      <div class="share-options">
        <div class="share-option" data-platform="wechat">
          <div class="share-icon wechat">💬</div>
          <div class="share-name">微信好友</div>
        </div>
        <div class="share-option" data-platform="moments">
          <div class="share-icon moments">📱</div>
          <div class="share-name">朋友圈</div>
        </div>
        <div class="share-option" data-platform="xiaohongshu">
          <div class="share-icon xiaohongshu">📕</div>
          <div class="share-name">小红书</div>
        </div>
        <div class="share-option" data-platform="weibo">
          <div class="share-icon weibo">👁</div>
          <div class="share-name">微博</div>
        </div>
      </div>
      <div class="share-cancel" id="cancelShare">取消</div>
    </div>
  </div>
  
  <!-- 脚本文件 -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/poem-generator.js"></script>
  <script src="js/poster-generator.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
